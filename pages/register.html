<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YIC Events | Register</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <span class="logo">YIC Events</span>
      <nav class="top-nav">
        <a href="../pages/home.html">Home</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="login-card card card--wide card--decor">
      <div class="dashboard-title">
        <a href="../pages/home.html" class="dashboard-events-btn">Back</a>
      </div>

      <h2>User Registration Page</h2>

      <!-- Selected Event Display -->
      <div id="selectedEvent" class="selected-event" style="display: none;">
        <div class="event-summary">
          <h3>Registering for:</h3>
          <p id="eventTitle">Event Title</p>
          <p id="eventDate">Date: Event Date</p>
        </div>
      </div>

      <form class="login-form" id="registrationForm">
        <label>
          Name:
          <input type="text" id="userName" placeholder="Enter your full name" required />
        </label>
        <label>
          Student ID:
          <input type="text" id="studentId" placeholder="Enter your student ID" required />
        </label>
        <label>
          Email:
          <input type="email" id="userEmail" placeholder="Enter your email" required />
        </label>
        <label>
          Major:
          <input type="text" id="userMajor" placeholder="Enter your major" required />
        </label>
        <label>
          Password:
          <input type="password" id="userPassword" placeholder="Create a password" required />
        </label>
        <label>
          Date of Birth:
          <input type="date" id="userDob" placeholder="MM/DD/YYYY" required />
        </label>

        <button type="submit" class="btn login-btn">Register</button>
      </form>

      <p class="register-text">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>

  <div class="modal-overlay" id="confirmationModal">
    <div class="modal-card">
      <h3 id="modalTitle">Confirmation</h3>
      <p id="modalMessage">Are you sure?</p>
      <div class="modal-actions">
        <button class="btn yes-btn" onclick="confirmModalChoice(true)">Yes</button>
        <button class="btn no-btn" onclick="confirmModalChoice(false)">No</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>YIC Events</p>
    <p>Layan 441500004 ~ Nada 441500071</p>
  </footer>
  <script src="../js/script.js"></script>
</body>
</html>
