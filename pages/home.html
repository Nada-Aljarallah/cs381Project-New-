
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YIC Events | Home</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
      <h1>YIC Events</h1>
      <nav class="top-nav">
        <a href="home.html" class="active">Home</a>
        <a href="admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">

    <section class="home-card card card--hero card--decor">

      <h2>Welcome to YIC Events</h2>

      <ul class="features-list">
        <li>Explore upcoming events</li>
        <li>Join exciting activities</li>
        <li>Stay updated with new events</li>
      </ul>
      <div class="divider"></div>
      <button class="btn main-btn" onclick="goToEvents()">Join Events</button>

    </section>

  </main>

  <div class="modal-overlay" id="accountModal">
    <div class="modal-card">
      <h3>Do you already have an account?</h3>
      <p>Press Yes if you want to log in, or No if you want to register.</p>
      <div class="modal-actions">
        <button class="btn yes-btn" onclick="goToLogin()">Yes</button>
        <button class="btn no-btn" onclick="goToRegister()">No</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>YIC Events</p>
    <p>Layan 441500004 ~ Nada 441500071</p>
  </footer>

  <script src="../js/script.js"></script>
</body>
</html>
